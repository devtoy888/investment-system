<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>主任每日跟踪 2026-07-16</title>
<style>
  :root{--bg:#0d1117;--card:#161b22;--border:#30363d;--txt:#c9d1d9;--accent:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.7;padding:16px;max-width:780px;margin:0 auto}
  h1{font-size:22px;color:var(--accent);margin-bottom:8px}
  h2{font-size:18px;color:var(--accent);margin:24px 0 10px;border-left:3px solid var(--accent);padding-left:10px}
  h3{font-size:15px;color:var(--txt);margin:16px 0 8px}
  .meta{font-size:12px;color:#8b949e;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:12px}
  .warn{background:#2d2412;border:1px solid var(--yellow);color:#e3b341;padding:10px 14px;border-radius:8px;font-size:13px;margin:12px 0}
  .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin:12px 0}
  .post{background:#0f1b2d;border-left:3px solid var(--accent);padding:12px 14px;border-radius:8px;margin:8px 0;font-size:14px}
  .stats{font-size:12px;color:#8b949e;margin-top:6px}
  table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
  th,td{border:1px solid var(--border);padding:8px 10px;text-align:left}
  th{background:#1c2128;color:var(--accent)}
  .cmt{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;margin:6px 0;font-size:13px}
  .cmt .u{color:var(--accent);font-size:12px}
  .tag{display:inline-block;background:#1f6feb22;color:var(--accent);font-size:11px;padding:2px 8px;border-radius:10px;margin:2px}
  code{background:#1c2128;padding:2px 6px;border-radius:4px;font-size:12px;color:#e3b341}
</style>
</head>
<body>
<div id="content">加载中…</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
fetch('director_daily_2026-07-16.md')
  .then(r=>r.text())
  .then(t=>{document.getElementById('content').innerHTML=marked.parse(t)})
  .catch(e=>{document.getElementById('content').innerHTML='<p style="color:red">加载失败: '+e+'</p>'});
</script>
</body>
</html>
