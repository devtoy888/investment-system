<!DOCTYPE html>

<style>

.dk{--bg:#0d0d1a;--cd:#16162a;--tx:#e0e0e0;--t2:#888;--bd:#2a2a3e;--ac:#6b8cff;--up:#ff6b6b;--dn:#51cf66;--rk:#2a1515;--hdr:linear-gradient(135deg,#0a0a1a,#1a1a2e,#0f3460)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--tx);line-height:1.7;font-size:15px;transition:.2s}
.hd{background:var(--hdr);color:#fff;padding:24px 16px;text-align:center;position:relative}
.hd h1{font-size:18px;font-weight:600}
.hd .m{font-size:12px;opacity:.7;margin-top:3px}
.tg{position:fixed;top:10px;right:10px;z-index:99;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;padding:5px 12px;border-radius:16px;font-size:11px;cursor:pointer;backdrop-filter:blur(6px)}
.tg:hover{background:rgba(255,255,255,.2)}
.c{max-width:860px;margin:0 auto;padding:8px}
.ds{background:var(--cd);border-radius:10px;padding:10px 12px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid var(--bd)}
.sh{font-size:14px;font-weight:600;margin:12px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--bd);color:var(--ac)}
.tw{overflow-x:auto;margin:6px 0;border-radius:6px;border:1px solid var(--bd)}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:5px 7px;text-align:left;border-bottom:1px solid var(--bd);vertical-align:top}
th{background:rgba(74,108,247,.04);color:var(--t2);font-weight:600;font-size:11px;position:sticky;top:0}
.up{color:var(--up);font-weight:500}
.down{color:var(--dn);font-weight:500}
.st{background:var(--cd);border-radius:10px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.05);border-left:4px solid var(--ac)}
.stt{font-size:14px;font-weight:600;color:var(--ac);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--bd)}
.stb p{margin:4px 0;font-size:13px}
.sp{height:6px}
.bl{font-weight:600;padding:3px 0;font-size:13px}
.li{padding:2px 0 2px 14px;position:relative;font-size:12px}
.li::before{content:"▸";position:absolute;left:2px;color:var(--ac)}
.rc{background:var(--rk);border:1px solid rgba(231,76,60,.2);border-radius:6px;padding:8px 10px;margin:6px 0;font-size:12px}
.ft{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
.ft th{background:var(--ac);color:#fff;padding:6px 8px;text-align:left;font-size:11px}
.ft td{padding:6px 8px;border-bottom:1px solid var(--bd);vertical-align:top;font-size:11px}
.ft .ph{color:var(--up);font-weight:600}
.ft .pm{color:#e67e22;font-weight:600}
.ft .ab{color:var(--dn);font-weight:600}
.ft .as{color:var(--up);font-weight:600}
.ft .ah{color:#e67e22;font-weight:600}
@media(max-width:600px){body{font-size:14px}.c{padding:4px}.ds,.st{padding:8px 10px}th,td{padding:3px 5px;font-size:11px}.ft td{font-size:10px;padding:3px 5px}.ft th{font-size:10px;padding:3px 5px}.hd h1{font-size:16px}}
</style>
</head>
<body>
<div class="hd"><h1>测试报告</h1><div class="m">2026-07-21 🤖 AI生成 11:11</div><button class="tg" onclick="document.body.classList.toggle('dk')">🌓 主题</button></div>

</div>
<script>
if(window.matchMedia("(prefers-color-scheme:dark)").matches)document.body.classList.add("dk");

</script>
</body>
</html>
