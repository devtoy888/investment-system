<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>全行业筛选+主任微博完整分析+真实净值评估</title>
<style>
  :root{
    --bg:#0d1117;--card:#161b22;--border:#30363d;--txt:#c9d1d9;
    --accent:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;--muted:#8b949e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.75;padding:18px;max-width:820px;margin:0 auto;font-size:15px}
  h1{font-size:23px;color:var(--accent);margin-bottom:6px;font-weight:700}
  h2{font-size:19px;color:var(--accent);margin:30px 0 12px;padding-left:11px;border-left:4px solid var(--accent)}
  h3{font-size:16px;color:#e6edf3;margin:18px 0 8px}
  .meta{font-size:12.5px;color:var(--muted);margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border)}
  .warn{background:#2d2412;border:1px solid var(--yellow);color:#e3b341;padding:11px 15px;border-radius:9px;font-size:13px;margin:14px 0}
  .card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:15px 17px;margin:14px 0}
  .post{background:#0f1b2d;border-left:3px solid var(--accent);padding:13px 15px;border-radius:9px;margin:9px 0;font-size:14px}
  .stats{font-size:12px;color:var(--muted);margin-top:7px}
  blockquote{background:#161b22;border-left:3px solid var(--muted);padding:10px 14px;margin:10px 0;border-radius:7px;color:#adbac7;font-size:14px}
  code{background:#1c2128;color:#e3b341;padding:2px 6px;border-radius:5px;font-size:13px}
  pre{background:#1c2128;padding:13px 15px;border-radius:9px;overflow-x:auto;font-size:13px;border:1px solid var(--border)}
  pre code{background:none;color:#c9d1d9;padding:0}
  ul,ol{padding-left:22px;margin:8px 0}
  li{margin:5px 0}
  strong{color:#e6edf3}
  hr{border:none;border-top:1px solid var(--border);margin:22px 0}
  /* 表格样式 */
  table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13.5px;
    border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.3)}
  thead th{background:#1c2128;color:var(--accent);font-weight:600;text-align:right;padding:11px 12px;border-bottom:2px solid var(--border)}
  thead th:first-child{text-align:left}
  tbody td{background:var(--card);padding:10px 12px;border-bottom:1px solid var(--border);text-align:right}
  tbody td:first-child{text-align:left;color:#e6edf3;font-weight:500}
  tbody tr:nth-child(even) td{background:#11161d}
  tbody tr:hover td{background:#1b2230}
  tbody tr:last-child td{border-bottom:none}
  /* 涨跌配色 */
  td:contains("+"){color:var(--red)}      /* A股涨为红 */
  td:contains("-"){color:var(--green)}     /* A股跌为绿 */
  .pos{color:var(--red)!important}
  .neg{color:var(--green)!important}
  @media(max-width:600px){
    body{font-size:14px;padding:12px}
    table{font-size:12px}
    thead th,tbody td{padding:8px 7px}
    h1{font-size:20px}
  }
</style>
</head>
<body>
<div id="content">加载中…</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
function colorize(){
  // 给含+/-的单元格加配色（A股红涨绿跌）
  document.querySelectorAll('tbody td').forEach(td=>{
    const t=td.textContent.trim();
    if(/^\+/.test(t)){td.classList.add('pos');}
    else if(/^-/.test(t)){td.classList.add('neg');}
  });
}
fetch('sector_screening_2026-07-16.md')
  .then(r=>r.text())
  .then(t=>{
    const html=marked.parse(t);
    document.getElementById('content').innerHTML=html;
    colorize();
  })
  .catch(e=>{document.getElementById('content').innerHTML='<p style="color:var(--red)">加载失败: '+e+'</p>'});
</script>
</body>
</html>
